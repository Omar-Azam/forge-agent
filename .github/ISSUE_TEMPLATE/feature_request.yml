name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the form below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem you are trying to solve.
      placeholder: I find it frustrating when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show how a user would use this feature.
      render: shell
      placeholder: forge-agent --new-flag "example"

  - type: dropdown
    id: category
    attributes:
      label: Feature category
      options:
        - New tool
        - New CLI flag
        - New template
        - Performance improvement
        - Documentation
        - Bug fix / reliability
        - New model support
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I checked the ROADMAP.md and this is not already planned
          required: false
